name: PR Validation

on:
  pull_request:
    branches:
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install UI Dependencies
        run: npm ci
        working-directory: src/html/report-ui

      - name: Build Report UI
        run: npm run build
        working-directory: src/html/report-ui

      - name: Build Core Reporter
        run: npm run build

      # If you have unit tests, uncomment the line below:
      # - name: Run Tests
      #   run: npm run test
